# ============================================================================
# GENERATED FILE — do not edit by hand.
# Edit models.yaml, then run:  python3 gen_compose.py
# ----------------------------------------------------------------------------
# One service per model, each behind a compose `profile` (so it only starts
# when selected). Bring a model up with start.sh or directly:
#     docker compose --profile qwen3-vl-8b up -d
# vLLM binds 0.0.0.0:<port>; register it in miniclosedai as an `openai`
# backend with base_url  http://host.docker.internal:<port>/v1
# ============================================================================

services:
  qwen3-vl-8b:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    profiles:
    - qwen3-vl-8b
    entrypoint:
    - vllm
    - serve
    command:
    - Qwen/Qwen3-VL-8B-Instruct
    - --served-model-name
    - qwen3-vl-8b
    - --host
    - 0.0.0.0
    - --port
    - '8001'
    - --max-model-len
    - '16384'
    - --gpu-memory-utilization
    - '0.9'
    - --tensor-parallel-size
    - '1'
    - --limit-mm-per-prompt
    - '{"image": 5}'
    - --mm-processor-kwargs
    - '{"max_pixels": 1605632}'
    ports:
    - 8001:8001
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
      VLLM_API_KEY: ${VLLM_API_KEY:-}
    volumes:
    - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    ipc: host
    shm_size: 16gb
    deploy: &id001
      resources:
        reservations:
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s
