<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- transparent background — a deep neural network shaped like a brain:
       outline nodes trace a rounded two-lobe brain (top-centre dip + stem),
       inner "deep" layers fill it, all densely interconnected like a DNN. -->
  <g stroke="#5b8df9" stroke-width="0.7" opacity="0.5" fill="none" stroke-linecap="round">
    <!-- top lobes + dip -->
    <path d="M10 6 L16 8 L22 6  M10 6 L12 11 M22 6 L20 11 M16 8 L16 13"/>
    <!-- upper sides into inner layer -->
    <path d="M10 6 L6 11 M22 6 L26 11 M6 11 L12 11 M26 11 L20 11 M6 11 L5 16 M26 11 L27 16"/>
    <!-- inner upper layer mesh -->
    <path d="M12 11 L16 13 L20 11 M12 11 L12 18 M20 11 L20 18 M16 13 L12 18 M16 13 L20 18"/>
    <!-- sides into lower inner layer -->
    <path d="M5 16 L12 18 M27 16 L20 18 M5 16 L8 22 M27 16 L24 22"/>
    <!-- lower inner mesh + stem -->
    <path d="M12 18 L16 20 L20 18 M12 18 L8 22 M20 18 L24 22 M16 20 L16 25"/>
    <!-- rounded bottom + stem -->
    <path d="M8 22 L13 25 L16 25 L19 25 L24 22 M13 25 L16 25 L19 25"/>
  </g>
  <!-- outline neurons -->
  <g fill="#5b8df9">
    <circle cx="10" cy="6" r="1.8"/><circle cx="22" cy="6" r="1.8"/>
    <circle cx="16" cy="8" r="1.6"/>
    <circle cx="6" cy="11" r="1.7"/><circle cx="26" cy="11" r="1.7"/>
    <circle cx="5" cy="16" r="1.7"/><circle cx="27" cy="16" r="1.7"/>
    <circle cx="8" cy="22" r="1.7"/><circle cx="24" cy="22" r="1.7"/>
    <circle cx="13" cy="25" r="1.6"/><circle cx="19" cy="25" r="1.6"/>
    <circle cx="16" cy="25" r="1.6"/>
  </g>
  <!-- inner "deep" layers (lighter for depth) -->
  <g fill="#86acfb">
    <circle cx="12" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/>
    <circle cx="16" cy="13" r="1.7"/>
    <circle cx="12" cy="18" r="1.8"/><circle cx="20" cy="18" r="1.8"/>
    <circle cx="16" cy="20" r="1.7"/>
  </g>
</svg>
